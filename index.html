<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>C.Play — Children's Play Generator (offline)</title>
<script>
  // Run before stylesheets parse so the correct theme is applied immediately.
  (function(){
    try {
      var t = localStorage.getItem('cplay.theme');
      if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    } catch (e) {}
  })();
</script>
<style>
  :root {
    /* LIGHT MODE — paper-white + true black + single red accent */
    --bg: #ececec;
    --paper: #ffffff;
    --panel: #f3f3f3;
    --ink: #0a0a0a;
    --muted: #757575;
    --accent: #d62828;
    --accent-soft: #fde7e7;
    --accent2: #0a0a0a;
    --gold: #0a0a0a;
    --line: #d8d8d8;
    --line-soft: #ebebeb;
    --good: #2f7d4f;
    --warn: #d62828;
    --shadow: 0 1px 0 rgba(0,0,0,.02), 0 6px 18px rgba(0,0,0,.06), 0 24px 48px rgba(0,0,0,.03);
    --display: "Courier Prime", "Courier New", Courier, ui-monospace, monospace;
    --sans: "Courier Prime", "Courier New", Courier, ui-monospace, monospace;
    --script: "Courier Prime", "Courier Final Draft", "Courier New", Courier, ui-monospace, monospace;
    /* Character speaker colors: hero (c1) is the red accent; everyone else is ink. Narrator is muted. */
    --c1: #d62828; --c2: #0a0a0a; --c3: #0a0a0a; --c4: #0a0a0a;
    --c5: #0a0a0a; --c6: #0a0a0a; --c7: #0a0a0a; --c8: #0a0a0a;
    --cN: #999999;
  }
  :root[data-theme="dark"] {
    /* DARK MODE — near-black bg, off-white ink, brighter red */
    --bg: #0a0a0a;
    --paper: #181818;
    --panel: #121212;
    --ink: #f2f2f2;
    --muted: #888888;
    --accent: #ef4444;
    --accent-soft: #2a0e0e;
    --accent2: #f2f2f2;
    --gold: #f2f2f2;
    --line: #2a2a2a;
    --line-soft: #1e1e1e;
    --good: #4ad481;
    --warn: #ef4444;
    --shadow: 0 1px 0 rgba(0,0,0,.4), 0 6px 24px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.4);
    --c1: #ef4444; --c2: #f2f2f2; --c3: #f2f2f2; --c4: #f2f2f2;
    --c5: #f2f2f2; --c6: #f2f2f2; --c7: #f2f2f2; --c8: #f2f2f2;
    --cN: #777777;
  }
  /* System-preference fallback when no manual theme set */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]):not([data-theme="dark"]) {
      --bg: #0a0a0a;
      --paper: #181818;
      --panel: #121212;
      --ink: #f2f2f2;
      --muted: #888888;
      --accent: #ef4444;
      --accent-soft: #2a0e0e;
      --accent2: #f2f2f2;
      --gold: #f2f2f2;
      --line: #2a2a2a;
      --line-soft: #1e1e1e;
      --shadow: 0 1px 0 rgba(0,0,0,.4), 0 6px 24px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.4);
      --c1: #ef4444; --c2: #f2f2f2; --c3: #f2f2f2; --c4: #f2f2f2;
      --c5: #f2f2f2; --c6: #f2f2f2; --c7: #f2f2f2; --c8: #f2f2f2;
      --cN: #777777;
    }
  }
  * { box-sizing: border-box; }
  /* Hide scrollbars everywhere — scrolling stays functional, the bar disappears */
  html, body, * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
  ::-webkit-scrollbar, ::-webkit-scrollbar-track, ::-webkit-scrollbar-thumb,
  ::-webkit-scrollbar-button, ::-webkit-scrollbar-corner {
    width: 0 !important; height: 0 !important; display: none !important;
    background: transparent !important;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }
  body { min-height: 100vh; }
  /* Mobile (default): two-screen flow — only one visible at a time */
  .screen { display: none; }
  body[data-view="setup"] .screen-setup { display: block; }
  body[data-view="play"] .screen-play { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  body:not([data-view]) .screen-setup { display: block; }
  @media (max-width: 900px) {
    body[data-view="play"] .screen-play { height: 100vh; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  }
  /* DESKTOP: side-by-side sidebar + main script — both always visible */
  @media (min-width: 900px) {
    body {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: 100vh; overflow: hidden;
    }
    .screen-setup { display: block !important; height: 100vh; overflow-y: auto; padding: 18px 0 24px; }
    .screen-setup::-webkit-scrollbar, .screen-setup::-webkit-scrollbar-track, .screen-setup::-webkit-scrollbar-thumb { display: none !important; width: 0 !important; height: 0 !important; }
    .screen-setup .container { max-width: none; padding: 0 22px; }
    .screen-play { display: flex !important; flex-direction: column; height: 100vh; overflow: hidden; }
    /* Sidebar holds NEW + Generate. Hide play-screen NEW button + hamburger; show menu inline. */
    .play-back { display: none !important; }
    .hamburger { display: none !important; }
    .menu, .menu[hidden] {
      display: flex !important; flex-direction: row;
      position: static; padding: 0; min-width: 0; gap: 4px;
      box-shadow: none; border: 0; background: transparent;
    }
    .menu .iconbtn { font-size: 11px; padding: 8px 12px; }
    .play-head { padding: 12px 20px; }
    .play-head #docTitle { font-size: 14px; }
    /* Empty state for play column when no play is generated */
    body:not(.has-play) .screen-play #output::before {
      content: 'Pick your pieces, press Generate.';
      display: flex; align-items: center; justify-content: center;
      flex: 1; color: var(--muted); font-family: var(--display);
      font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
      width: 100%;
    }
    body:not(.has-play) .play-head #docTitle { color: var(--muted); }
    body:not(.has-play) .play-head .menu, body:not(.has-play) .play-head-right .theme-toggle { opacity: .35; pointer-events: none; }
    /* Keep page paper centered on desktop with comfortable side margins */
    .page-paper { width: min(820px, calc(100% - 80px), calc((100vh - 130px) * 0.7727)); }
    /* Desktop sidebar tweaks: constrain inputs that don't need full width */
    #castSize { width: 110px; }
    #seed { max-width: 220px; }
  }

  body { font-family: var(--sans); }

  /* SETUP SCREEN — full-page form */
  .screen-setup { background: var(--bg); padding: 32px 0 48px; }
  .screen-setup .container { max-width: 780px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 700px) {
    .screen-setup { padding: 16px 0 32px; }
    .screen-setup .container { padding: 0 14px; }
  }
  .setup-head { margin-bottom: 16px; }
  .setup-head .brand {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .setup-head h1 { margin: 0 0 4px; font-family: var(--display); font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }
  .setup-head .tagline { color: var(--muted); font-size: 12px; letter-spacing: .5px; }
  .setup-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 22px 26px;
  }
  @media (max-width: 700px) { .setup-card { padding: 16px 18px; border-radius: 12px; } }

  .setup-actions {
    display: flex; gap: 14px; margin: 20px 0 22px;
  }
  .setup-actions button { flex: 1; }
  @media (max-width: 600px) {
    .setup-actions { flex-direction: column; gap: 10px; }
    .setup-actions button { flex: 1 1 auto; width: 100%; }
  }

  /* PLAY SCREEN — script + nav */
  .screen-play { background: var(--bg); }
  .play-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .play-head #docTitle {
    font-family: var(--display); font-size: 13px;
    text-transform: uppercase; letter-spacing: 1px;
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .play-head-right { display: flex; align-items: center; gap: 6px; }
  /* NEW = red back button */
  .play-back {
    background: var(--accent); color: #fff; border: 1px solid var(--accent);
    padding: 10px 18px; border-radius: 10px; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    transition: background .12s;
  }
  .play-back:hover { background: var(--ink); border-color: var(--ink); }
  .hamburger {
    background: transparent; border: 1px solid var(--line); color: var(--ink);
    width: 40px; height: 40px; padding: 0; border-radius: 10px;
    cursor: pointer; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans);
  }
  .hamburger:hover { border-color: var(--ink); }
  .hamburger[aria-expanded="true"] { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Hamburger menu drawer */
  .menu {
    position: absolute; top: 64px; right: 16px; z-index: 20;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; padding: 8px; min-width: 220px;
    display: flex; flex-direction: column; gap: 4px;
    box-shadow: var(--shadow);
  }
  .menu[hidden] { display: none; }
  .menu .iconbtn {
    text-align: left; border: 0; background: transparent;
    padding: 12px 14px; font-size: 13px; border-radius: 8px;
    letter-spacing: .8px;
  }
  .menu .iconbtn:hover { background: var(--accent-soft); border: 0; }
  /* Mobile: hide status message in play-head — it crowds the title */
  @media (max-width: 600px) {
    .play-head #status { display: none; }
    .play-head { padding: 8px 12px; }
    .play-head #docTitle { font-size: 11px; letter-spacing: .8px; }
    .play-back { padding: 6px 10px; font-size: 10px; }
  }
  /* Hide scrollbar visually but keep functionality if content does overflow */
  aside .scroll::-webkit-scrollbar { width: 0; height: 0; }
  aside .scroll { scrollbar-width: none; }
  @media (max-width: 900px) { aside.controls { height: auto; position: static; overflow: visible; } aside .scroll { overflow: visible; } }
  aside .brand {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 8px; margin-bottom: 14px;
  }
  aside h1 { margin: 0 0 4px; font-family: var(--display); font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
  aside .brand .meta { flex: 1; min-width: 0; }
  aside .tagline { color: var(--muted); font-size: 11px; letter-spacing: .5px; }
  .theme-toggle {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink); width: 40px; height: 40px; flex: 0 0 40px;
    border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); padding: 0;
    transition: background .12s, border-color .12s;
  }
  .theme-toggle:hover { border-color: var(--ink); background: var(--accent-soft); }

  /* Accordion sections */
  details.section {
    border-top: 1px solid var(--line); padding: 0;
  }
  details.section:first-of-type { border-top: 0; }
  details.section > summary {
    list-style: none; cursor: pointer;
    padding: 14px 0; display: flex; align-items: center; justify-content: space-between;
    user-select: none;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary h2 {
    margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); font-weight: 700;
  }
  details.section > summary .summary-state {
    color: var(--muted); font-size: 22px; font-family: var(--sans); font-weight: 400;
    transition: transform .15s; line-height: 1;
  }
  details.section[open] > summary .summary-state { transform: rotate(45deg); }
  details.section[open] > summary { padding-bottom: 6px; }
  details.section > .body { padding-bottom: 14px; }
  details.section[open] > summary h2 { color: var(--ink); }
  label { display: block; font-size: 14px; margin: 18px 0 10px; letter-spacing: .3px; }
  label:first-child, .section h2 + label { margin-top: 0; }
  label .hint { color: var(--muted); font-weight: 400; font-size: 12px; text-transform: none; letter-spacing: 0; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; padding: 14px 16px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--paper); font-family: var(--sans); font-size: 15px; color: var(--ink);
  }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 12px; }
  .chip {
    font-size: 14px; padding: 12px 18px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--paper); cursor: pointer; user-select: none; font-family: var(--sans);
    color: var(--ink); letter-spacing: .4px; font-weight: 500;
    transition: border-color .12s, background .12s;
  }
  .chip:hover { border-color: var(--ink); }
  .chip[aria-pressed="true"] { background: var(--accent); color: #fff; border-color: var(--accent); }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .list .item { display: grid; grid-template-columns: 1fr 1.4fr auto; gap: 10px; }
  .list .item.simple { grid-template-columns: 1fr auto; }
  .list .item button.del {
    background: transparent; border: 1px solid var(--line); border-radius: 10px;
    width: 44px; cursor: pointer; color: var(--muted); font-family: var(--sans); font-size: 18px;
  }
  .list .item button.del:hover { color: var(--ink); border-color: var(--ink); }
  .add-btn {
    background: transparent; border: 1px dashed var(--line); border-radius: 10px;
    padding: 14px; font-size: 14px; cursor: pointer; color: var(--muted); width: 100%;
    font-family: var(--sans); letter-spacing: .4px; margin-top: 8px;
  }
  .add-btn:hover { color: var(--ink); border-color: var(--ink); }
  .lock-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .lock {
    font-size: 13px; padding: 10px 16px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--paper); cursor: pointer; user-select: none; color: var(--muted);
    font-family: var(--sans); letter-spacing: .4px;
  }
  .lock[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--ink); color: var(--ink); }

  .actions {
    margin: 18px 0 0; padding: 18px 0 0;
    border-top: 1px solid var(--line);
    display: flex; gap: 14px;
  }
  button.primary, button.secondary {
    flex: 1; padding: 12px 16px; border-radius: 10px; cursor: pointer; font-weight: 700;
    border: 1px solid var(--accent); font-size: 12px; font-family: var(--sans);
    letter-spacing: 1.2px; text-transform: uppercase;
    transition: background .12s, transform .12s;
  }
  /* Mobile keeps roomier buttons for fingertip-comfortable taps */
  @media (max-width: 600px) {
    button.primary, button.secondary { padding: 16px 18px; font-size: 14px; border-radius: 12px; }
  }
  button.primary { background: var(--accent); color: #fff; }
  button.primary:hover { background: var(--ink); border-color: var(--ink); }
  button.secondary { background: var(--paper); color: var(--ink); }
  button.secondary:hover { background: var(--accent-soft); }

  main {
    padding: 16px 28px 24px; max-width: 1000px; margin: 0 auto; width: 100%;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    position: relative;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .topbar .left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .topbar #docTitle { font-size: 14px; max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
  .topbar .right { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .iconbtn {
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 14px; font-size: 12px; cursor: pointer; color: var(--ink);
    font-family: var(--sans); letter-spacing: .6px; text-transform: uppercase;
    transition: border-color .15s, background .15s;
  }
  .iconbtn:hover { border-color: var(--ink); }

  /* Rehearsal selector — inline in nav */
  .rehearsal-bar { display: none; align-items: center; gap: 6px; }
  .rehearsal-bar.show { display: inline-flex; }
  .rehearsal-bar label {
    margin: 0; font-size: 10px; letter-spacing: .6px;
    text-transform: uppercase; color: var(--muted); font-weight: 700;
  }
  .rehearsal-bar select {
    padding: 4px 8px; border: 1px solid var(--line); border-radius: 2px;
    font-family: var(--sans); font-size: 10px; background: var(--paper);
    text-transform: uppercase; letter-spacing: .6px; color: var(--ink);
    max-width: 140px;
  }
  .rehearsal-bar .hint, .rehearsal-bar .clear { display: none; }

  .empty {
    padding: 100px 36px; text-align: center; color: var(--muted);
    background: var(--paper); border: 1px solid var(--line); border-radius: 2px;
  }
  .empty .curtain { width: 48px; height: 48px; margin: 0 auto 18px; color: var(--ink); opacity: .5; }
  .empty h2 {
    font-family: var(--display); font-size: 18px; margin: 0 0 8px; color: var(--ink);
    text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
  }
  .empty p { font-size: 13px; line-height: 1.6; max-width: 40ch; margin: 0 auto; font-family: var(--script); }

  /* ====== Document = pages, one shown at a time ====== */
  .doc { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* Page navigation bar */
  .page-nav {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 14px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 12px;
    font-family: var(--sans); font-size: 12px; letter-spacing: .6px; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .page-nav .reh-spacer { flex: 1; }
  .page-nav select {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--paper); font-family: var(--sans); font-size: 12px;
    text-transform: uppercase; letter-spacing: .6px; color: var(--ink); cursor: pointer;
    max-width: 240px;
  }
  .page-nav button {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--paper); font-family: var(--sans); font-size: 12px; cursor: pointer;
    color: var(--ink); letter-spacing: .6px; text-transform: uppercase;
  }
  .page-nav button:hover { border-color: var(--ink); }
  .page-nav button:disabled { opacity: .4; cursor: not-allowed; }
  .page-nav .counter { color: var(--muted); }

  /* Page paper — 8.5x11 ratio, sized to fit BOTH viewport dimensions */
  .page-paper {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 2px;
    box-shadow: var(--shadow);
    padding: 5% 7% 6%;
    font-family: var(--script);
    line-height: 1.5;
    color: var(--ink);
    position: relative;
    display: none;
    /* Largest 8.5x11 paper that fits both width (with some breathing room for flip arrows) and height */
    width: min(880px, calc(100% - 100px), calc((100vh - 130px) * 0.7727));
    aspect-ratio: 8.5 / 11;
    margin: 0 auto;
    overflow: hidden;
    box-sizing: border-box;
    flex-shrink: 0;
    flex-grow: 0;
  }
  .page-paper.is-active { display: flex; flex-direction: column; }
  /* Center page-paper vertically in available output space */
  #output { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex: 1; min-height: 0; padding: 14px 12px; }
  @media (max-width: 560px) {
    .page-paper { padding: 24px 20px 32px; height: auto; aspect-ratio: auto; max-width: 100%; }
  }

  /* Floating page-flip arrows (left/right of the page, anchored to main) */
  .flip {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--paper); border: 1px solid var(--line);
    color: var(--ink); cursor: pointer;
    font-family: var(--sans); font-size: 22px; line-height: 1;
    display: none; align-items: center; justify-content: center;
    box-shadow: var(--shadow); z-index: 4;
  }
  .flip:hover { border-color: var(--ink); background: var(--accent-soft); }
  .flip:disabled { opacity: .25; cursor: not-allowed; }
  .flip.show { display: flex; }
  .flip.left { left: 4px; }
  .flip.right { right: 4px; }
  @media (max-width: 700px) { .flip { display: none !important; } }
  .page-paper .page-num {
    position: absolute; bottom: 18px; right: 22px;
    font-family: var(--script); font-size: 9px; color: var(--muted);
    letter-spacing: 1px;
  }
  .page-paper .page-running {
    position: absolute; top: 18px; left: 22px;
    font-family: var(--script); font-size: 8.5px; color: var(--muted);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .page-paper .page-running.right { left: auto; right: 22px; top: 18px; }

  /* Cover block — title page */
  .cover {
    text-align: center; padding: 100px 0 60px;
    display: flex; flex-direction: column; gap: 20px; align-items: center;
  }
  .eyebrow {
    font-family: var(--sans); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin: 0;
  }
  .play-title {
    font-family: var(--display); font-size: 32px; line-height: 1.2; margin: 0 auto;
    max-width: 26ch; letter-spacing: 1px; color: var(--ink); font-weight: 700;
    text-transform: uppercase;

  /* Cast — compact list, monospace */
  .cast-grid {

  .cast-card {

  .cast-card .avatar {

  /* Lines — real-script density, Courier body */

  /* ===== Mobile breakpoints ===== */

  /* ===== Print: show all pages ===== */
  @media print {

/* ============================================================
   STATE
   ============================================================ */
const state = {
  gradeBand: "3-5",
  length: "short",
  castSize: 5,
  lesson: "kindness",
  tone: "silly",
  conflict: "vs-self",
  setting: "",

  props: [],        // [string]
  narrator: "light",
  directions: "standard",
  songs: false,
  random: "none",
  locks: { characters: false, props: false, setting: false },
  seed: "",
  play: null,

/* ============================================================
   SEEDED RNG (mulberry32 + string hash)
   ============================================================ */
function hashString(s) {
  let h = 1779033703 ^ s.length;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h ^= h >>> 16) >>> 0;
}
function makeRng(seedStr) {
  let s = hashString(seedStr || String(Math.random()));
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let rng = makeRng("");

const pick = arr => arr[Math.floor(rng() * arr.length)];
const pickN = (arr, n) => {
  const c = arr.slice();
  const out = [];
  while (out.length < n && c.length) out.push(c.splice(Math.floor(rng() * c.length), 1)[0]);
  return out;
};
const chance = p => rng() < p;

/* ============================================================
   CONTENT TABLES
   ============================================================ */

// Setting library: speciesPool used for character species, features for slot fills
const SETTINGS = {
  "enchanted forest": {
    short: "the enchanted forest",
    full: "an enchanted forest at the edge of the kingdom, full of mossy trees and golden fireflies",
    speciesPool: ["fox","rabbit","owl","hedgehog","squirrel","badger","deer","toad","fawn","wood-sprite"],

// Resolve {key} from a context object. Iterates so a variant pool (e.g. "{exclaim}")
// that returns a string containing more {tokens} also gets filled.
function fill(template, ctx) {
  if (!template) return "";
  // Fallback chains for character roles that may not exist on small casts
  const charChains = {
    helper:   ['helper','friend','foil','hero'],
    mentor:   ['mentor','friend','foil','hero'],
    friend:   ['friend','foil','helper','mentor','hero'],
    newcomer: ['newcomer','foil','friend','helper','hero'],
    foil:     ['foil','friend','helper','mentor','hero'],
    hero:     ['hero','foil','friend','mentor','helper'],
  };
  let out = template, prev;
  for (let pass = 0; pass < 6; pass++) {
    prev = out;
    out = out.replace(/\{([a-zA-Z0-9_.]+)\}/g, (m, key) => {
      // Character roles (with fallback through chain)
      if (charChains[key]) {
        for (const alt of charChains[key]) if (ctx.chars[alt]) return ctx.chars[alt].name;
      } else if (ctx.chars[key]) {
        return ctx.chars[key].name;
      }
      if (ctx.props[key] !== undefined) return ctx.props[key];
      if (key === "settingShort") return ctx.setting.short;
      if (key === "settingFull") return ctx.setting.full;
      if (key.startsWith("settingFeature")) {
        const idx = parseInt(key.replace("settingFeature","")) || 1;
        return ctx.setting.features[(idx - 1) % ctx.setting.features.length];
      }
      const toneV = TONES[ctx.state.tone] || {};
      const pool = toneV[key] || V[key];
      if (pool && Array.isArray(pool)) return pick(pool);
      return m; // leave unresolved literal in place; loop will exit
    });
    if (out === prev) break;
  }
  return out;
}

// Resolve speaker code (hero/foil/...) to actual character name
function resolveSpeaker(code, ctx) {
  if (code === "N" || code === "NARRATOR") return "NARRATOR";
  if (code === "ALL") return "ALL";
  if (ctx.chars[code]) return ctx.chars[code].name;
  // Smart fallback chains; never map back to hero (avoids hero-to-hero dialogue)
  const chains = {
    helper:   ['foil','friend'],
    mentor:   ['friend','foil'],
    newcomer: ['foil','friend'],
    friend:   ['foil','helper','mentor'],
    foil:     ['friend','helper','mentor'],
  };
  const chain = chains[code] || [];
  for (const alt of chain) if (ctx.chars[alt]) return ctx.chars[alt].name;
  return null; // signal: skip this line
}

function expandBeat(beat, ctx, opts = {}) {
  const out = [];
  for (const ln of beat) {
    const speaker = resolveSpeaker(ln.s, ctx);
    if (!speaker) continue; // role doesn't exist in this cast — skip
    if (speaker === "NARRATOR" && ctx.state.narrator === "off") continue;
    const text = fill(ln.t, ctx).trim();
    const direction = ln.d ? fill(ln.d, ctx) : undefined;
    out.push({ speaker, text, direction });
  }
  // Adjust narrator density
  if (ctx.state.narrator === "prominent" && opts.allowExtraNarrator !== false) {
    // ok, leave as-is
  } else if (ctx.state.narrator === "light") {
    // drop some narrator lines past the first per beat
    let seenN = 0;
    return out.filter(l => {
      if (l.speaker === "NARRATOR") { seenN++; return seenN <= 1; }
      return true;
    });
  }
  return out;
}

// Adjust line text for grade band (K-2 = simpler/shorter)
function simplifyForGrade(lines, gradeBand) {
  if (gradeBand !== "K-2") return lines;
  return lines.map(l => ({
    ...l,
    text: l.text
      .replace(/\bperfectly\s+ordinary\b/gi, "regular")
      .replace(/\bnonetheless\b/gi, "still")
      .replace(/\bobservation\b/gi, "thing I noticed")
      .replace(/—/g, ".")
      // shorten very long sentences crudely
      .split(". ").slice(0, 3).join(". "),
  }));
}

function assembleCharacters(state) {
  const setting = SETTINGS[matchSettingKey(state.setting)] || SETTINGS["enchanted forest"];
  const speciesPool = setting.speciesPool.slice();
  const userChars = state.characters.filter(c => (c.name || "").trim() || (c.hint || "").trim());
  const usedNames = new Set();
  const makeChar = (role, override) => {
    let name, description;
    if (override) {
      name = override.name && override.name.trim() ? override.name.trim() : pick(NAMES.filter(n => !usedNames.has(n)));
      description = override.hint && override.hint.trim() ? override.hint.trim() : `the ${pick(speciesPool)} (${roleHint(role)})`;
    } else {
      name = pick(NAMES.filter(n => !usedNames.has(n)));
      const sp = speciesPool.length ? speciesPool.splice(Math.floor(rng() * speciesPool.length), 1)[0] : "friend";
      description = `the ${sp} — ${roleHint(role)}`;
    }
    usedNames.add(name);
    return { role, name, description };
  };
  const roles = ["hero","foil","friend","mentor","helper","newcomer"];
  const chars = {};
  // Map user characters to roles in order
  userChars.slice(0, roles.length).forEach((uc, i) => {
    chars[roles[i]] = makeChar(roles[i], uc);
  });
  // Required: hero
  if (!chars.hero) chars.hero = makeChar("hero");
  // Fill foil/friend at minimum
  if (!chars.foil) chars.foil = makeChar("foil");
  if (state.castSize >= 3 && !chars.friend) chars.friend = makeChar("friend");
  if (state.castSize >= 4 && !chars.mentor) chars.mentor = makeChar("mentor");
  if (state.castSize >= 5 && !chars.helper) chars.helper = makeChar("helper");
  if (state.castSize >= 6 && !chars.newcomer) chars.newcomer = makeChar("newcomer");
  // Extras for very large casts
  let extraCount = Math.max(0, state.castSize - Object.keys(chars).length);
  let ei = 1;
  while (extraCount > 0) {
    chars["extra" + ei] = makeChar("extra" + ei);
    ei++; extraCount--;
  }
  return { chars, setting };
}
function roleHint(role) {
  return ({
    hero: "earnest, our main character",
    foil: "stubborn at first, comes around",
    friend: "loyal and warm",
    mentor: "patient, has been through it",
    helper: "small, careful, easily missed",
    newcomer: "the new face",
  })[role] || "supporting role";
}
function matchSettingKey(text) {
  if (!text) return "enchanted forest";
  const t = text.toLowerCase();
  for (const k of Object.keys(SETTINGS)) {
    if (t.includes(k.toLowerCase()) || k.toLowerCase().includes(t)) return k;
  }
  return null;
}

function assembleProps(state, setting) {
  const userProps = state.props.filter(p => (p || "").trim()).map(p => p.trim());
  const want = Math.max(3, Math.min(6, userProps.length + 3));
  const pool = setting.typicalProps.filter(p => !userProps.includes(p));
  const filled = userProps.concat(pickN(pool, want - userProps.length));
  // expose by index AND key
  const byKey = {};
  filled.forEach((p, i) => byKey["prop" + (i + 1)] = p);
  return { list: filled, byKey };
}

function pickShape(state) {
  // Prefer shapes that fit lessons
  const fits = {
    kindness: ["lost-thing","new-arrival","the-secret"],
    honesty: ["broken-thing","the-secret","promise-tested"],
    courage: ["scary-place","underdog-contest"],
    friendship: ["new-arrival","promise-tested","the-secret"],
    perseverance: ["task-too-big","underdog-contest"],
    sharing: ["new-arrival","lost-thing","underdog-contest"],
    teamwork: ["task-too-big","underdog-contest"],
    environment: ["lost-thing","task-too-big"],
    inclusion: ["new-arrival","underdog-contest"],
    responsibility: ["broken-thing","promise-tested"],
    patience: ["task-too-big","promise-tested"],
    gratitude: ["lost-thing","new-arrival","the-secret"],
  }[state.lesson] || [];
  const pool = SHAPES.filter(s => fits.includes(s.id));
  if (pool.length) return pick(pool);
  return pick(SHAPES);
}

function applyTwist(lines, ctx) {
  if (ctx.state.random === "none") return lines;
  if (ctx.state.random === "spicy") {
    const t = pick(TWISTS);
    const direction = fill(t, ctx);
    // attach as opening direction marker on first line of climax (caller can use)
    return [{ speaker: "NARRATOR", text: "(twist) " + direction, direction: undefined }, ...lines];
  }
  if (ctx.state.random === "wild") {
    // wild: also add a mash-up note before the climax
    return [{ speaker: "NARRATOR", text: "(suddenly, in a way no one expected, the world tilts a little — and a wild detail enters the scene)", direction: undefined }, ...lines];
  }
  return lines;
}

function buildArc(ctx) {
  const shape = ctx.shape;
  const lesson = LESSONS[ctx.state.lesson];
  let lines = [];
  // Optionally replace the first narrator line of setup with a flourish hook
  const flourish = pick(OPENING_FLOURISHES);
  if (flourish) {
    lines = lines.concat(expandBeat(flourish, ctx));
    // Skip the original setup's first narrator line (which is a similar opener)
    const setupRest = shape.setup.filter((b, i) => !(i === 0 && (b.s === 'N' || b.s === 'NARRATOR')));
    lines = lines.concat(expandBeat(setupRest, ctx));
  } else {
    lines = lines.concat(expandBeat(shape.setup, ctx));
  }
  lines = lines.concat(expandBeat(shape.inciting, ctx));
  // Ambient atmosphere moment between inciting and rising (only if narrator is on)
  if (ctx.state.narrator !== 'off' && ctx.state.length !== 'short' && chance(0.5)) {
    lines.push({ speaker: 'NARRATOR', text: fill(pick(AMBIENT_MOMENTS), ctx) });
  }
  lines = lines.concat(expandBeat(shape.rising, ctx));
  // Conflict-aware injection — adds 1-3 lines tinted to the conflict type
  const cb = CONFLICT_BEATS[ctx.state.conflict];
  if (cb) lines = lines.concat(expandBeat(cb, ctx));
  // A second ambient moment right before the climax
  if (ctx.state.narrator !== 'off' && chance(0.4)) {
    lines.push({ speaker: 'NARRATOR', text: fill(pick(AMBIENT_MOMENTS), ctx) });
  }
  // Optional song just before climax
  if (ctx.state.songs) {
    const verses = pick(SONGS);
    const speaker = ctx.chars.helper?.name || ctx.chars.friend?.name || ctx.chars.hero.name;
    verses.forEach((v, i) => lines.push({ speaker: i === 0 ? speaker : "ALL", text: v }));
  }
  // Pick which lesson variant to use (1 or 2 if available)
  const useVar2 = lesson.climaxLines2 && chance(0.5);
  const climaxBeat = useVar2 ? lesson.climaxLines2 : lesson.climaxLines;
  const resBeat = useVar2 ? (lesson.resolutionLines2 || lesson.resolutionLines) : lesson.resolutionLines;
  let climax = expandBeat(climaxBeat, ctx);
  climax = applyTwist(climax, ctx);
  lines = lines.concat(climax);
  lines = lines.concat(expandBeat(resBeat, ctx));

  // Closing tag
  lines.push({ speaker: "NARRATOR", text: fill(pick(V.resolveClose), ctx) });

  return simplifyForGrade(lines, ctx.state.gradeBand);
}

function chunkIntoActs(lines, length) {
  // Try to chunk by content markers
  const total = lines.length;
  if (length === "short") {
    return [{
      number: 1, title: "",
      scenes: [{
        number: 1,
        location: lines._location || "",
        openingDirection: lines._opening || "",
        lines,
      }]
    }];
  }
  if (length === "medium") {
    const half = Math.ceil(total * 0.45);
    const a = lines.slice(0, half);
    const b = lines.slice(half);
    return [
      { number: 1, title: "Setup", scenes: [{ number: 1, location: "", openingDirection: "", lines: a }] },
      { number: 2, title: "Choice & After", scenes: [{ number: 1, location: "", openingDirection: "", lines: b }] },
    ];
  }
  // long: 3 acts
  const a1 = Math.ceil(total * 0.32);
  const a2 = Math.ceil(total * 0.65);
  return [
    { number: 1, title: "The Day Begins", scenes: [{ number: 1, location: "", openingDirection: "", lines: lines.slice(0, a1) }] },
    { number: 2, title: "Trouble", scenes: [{ number: 1, location: "", openingDirection: "", lines: lines.slice(a1, a2) }] },
    { number: 3, title: "Choice & After", scenes: [{ number: 1, location: "", openingDirection: "", lines: lines.slice(a2) }] },
  ];
}

function makeTitle(ctx) {
  // Pool: shape-specific titles + global title patterns
  const pool = [...ctx.shape.titles, ...GLOBAL_TITLES];
  // Try a few times to avoid awkward unfilled slots (some patterns reference foil etc.)
  for (let i = 0; i < 5; i++) {
    const t = fill(pick(pool), ctx);
    if (!t.includes('{')) return t;
  }
  // Fallback: shape title only
  return fill(pick(ctx.shape.titles), ctx);
}
function makeLogline(ctx) {
  const lesson = LESSONS[ctx.state.lesson];
  const hero = ctx.chars.hero.name;
  const foil = ctx.chars.foil ? ctx.chars.foil.name : 'an unlikely partner';
  const setting = ctx.setting.short;
  const prop1 = ctx.props.prop1 || 'something small';
  const templates = [
    `In ${setting}, ${hero} learns about ${lesson.label} the hard way — and the right way, just in time.`,
    `One ordinary day in ${setting} turns into a small, important lesson about ${lesson.label}.`,
    `A ${ctx.state.tone} tale about ${lesson.label}, set in ${setting}, with a cast that has to figure it out together.`,
    `When ${prop1} goes missing in ${setting}, ${hero} discovers what really matters.`,
    `${hero} thought today would be ordinary. ${setting} had other plans.`,
    `Sometimes the smallest moment — a ${prop1}, a quiet word — changes everything.`,
    `${hero} and ${foil} don't see eye to eye. By sundown in ${setting}, that might change.`,
    `A short play about ${lesson.label}, where the hardest thing and the right thing turn out to be the same thing.`,
    `A story about a ${prop1}, ${setting}, and the choice that made it all worthwhile.`,
    `Some lessons live in big speeches. This one lives in a single, small choice.`,
    `A play in which a ${prop1}, ${setting}, and one quiet moment add up to more than they seem.`,
    `${hero} has a problem. ${foil} has the wrong answer. ${setting} is about to teach them both.`,
  ];
  return pick(templates);
}

function buildPlay(state) {
  const seedToUse = state.seed || String(Math.floor(Math.random() * 1e9));
  rng = makeRng(seedToUse);
  state.seed = seedToUse;
  document.getElementById('seed').value = seedToUse;

  const { chars, setting } = assembleCharacters(state);
  const props = assembleProps(state, setting);
  const ctx = {
    state, chars, setting, props: props.byKey,
    shape: pickShape(state),
  };
  const lines = buildArc(ctx);

  const charactersOut = Object.values(chars).map(c => ({ name: c.name, description: c.description }));

  const acts = chunkIntoActs(lines, state.length);
  // Assign scene-specific location and opening direction
  // Each scene picks a different setting feature and a stage tone matching its position in the arc
  let sceneIndex = 0;
  const totalScenes = acts.reduce((n, a) => n + a.scenes.length, 0);
  acts.forEach((act, ai) => {
    act.scenes.forEach((sc, si) => {
      const feature = setting.features[sceneIndex % setting.features.length];
      const where = `${setting.full}, near ${feature}`;
      sc.location = where;
      // pick stage tone by progression
      const pos = sceneIndex / Math.max(1, totalScenes - 1); // 0..1
      let toneKey = 'bright';
      if (pos < 0.25) toneKey = 'bright';
      else if (pos < 0.55) toneKey = 'later';
      else if (pos < 0.85) toneKey = 'tense';
      else toneKey = 'warm';
      const ctx2 = { ...{ chars, setting, props: props.byKey, state }, };
      const od = pick(SCENE_OPENINGS[toneKey]);
      sc.openingDirection = fill(od, ctx2);
      sceneIndex++;
    });
  });

  const lengthMin = { short: 5, medium: 12, long: 22 }[state.length];

  return {
    title: makeTitle(ctx),
    logline: makeLogline(ctx),
    lessonTakeaway: LESSONS[state.lesson].takeaway,
    estimatedRunTimeMin: lengthMin,
    setting: setting.full,
    characters: charactersOut,
    props: props.list,
    acts,
    shapeId: ctx.shape.id, // preserved so regenerateScene can reuse it
  };
}

/* ============================================================
   GENERATION (offline, deterministic given seed)
   ============================================================ */
function setStatus(msg, kind = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = kind;
}

function generate() {
  try {
    setStatus('Generating…');
    if (state.play) {
      if (state.locks.characters) state.characters = state.play.characters.map(c => ({ name: c.name, hint: c.description }));
      if (state.locks.props) state.props = state.play.props.slice();
      if (state.locks.setting) state.setting = state.play.setting;
    }
    state.seed = String(Math.floor(Math.random() * 1e9));
    const seedEl = document.getElementById('seed'); if (seedEl) seedEl.value = state.seed;
    state.play = buildPlay(state);
    renderPlay();
    document.body.classList.add('has-play');
    setView('play');
    setStatus('Done.', 'success');
  } catch (e) {
    console.error(e);
    setStatus(e.message || 'Error', 'error');
  }
}

function setView(v) {
  document.body.dataset.view = v;
  closeMenu();
  if (v === 'play') {
    // Update theme toggle icons (the play-screen toggle is a different element)
    updateThemeIcon();
  }
}
function closeMenu() {
  const m = document.getElementById('menu');
  const h = document.getElementById('hamburger');
  if (!m || !h) return;
  m.hidden = true;
  h.setAttribute('aria-expanded', 'false');
}
function toggleMenu() {
  const m = document.getElementById('menu');
  const h = document.getElementById('hamburger');
  const open = m.hidden;
  m.hidden = !open;
  h.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function regenerateScene(actIdx, sceneIdx) {
  // Re-run engine for ONE scene only. Keeps cast/setting/props/shape; uses a
  // local rng so global state.seed (and the original play seed) stays untouched.
  try {
    setStatus(`Rewriting Act ${actIdx + 1}, Scene ${sceneIdx + 1}…`);
    const keepChars = state.play.characters;
    const keepProps = state.play.props;
    const keepSetting = state.play.setting;
    // Local rng — does not mutate global rng or state.seed
    const localSeed = String(Math.floor(Math.random() * 1e9));
    const savedRng = rng;
    rng = makeRng(localSeed);

    const settingKey = matchSettingKey(keepSetting) || "enchanted forest";
    const setting = SETTINGS[settingKey];
    const roleOrder = ["hero","foil","friend","mentor","helper","newcomer"];
    const chars = {};
    keepChars.slice(0, roleOrder.length).forEach((c, i) => {
      chars[roleOrder[i]] = { role: roleOrder[i], name: c.name, description: c.description };
    });
    const props = {};
    keepProps.forEach((p, i) => props["prop" + (i + 1)] = p);

    // Reuse the SAME shape as the original play (preserves continuity)
    const shape = (state.play.shapeId && SHAPES.find(s => s.id === state.play.shapeId)) || pickShape(state);

    const ctx = { state, chars, setting, props, shape };
    const fresh = buildArc(ctx);
    const acts = chunkIntoActs(fresh, state.length);
    const newScene = acts[actIdx]?.scenes[sceneIdx];
    rng = savedRng; // restore global rng
    if (!newScene) { setStatus('Could not rewrite that scene.', 'error'); return; }
    state.play.acts[actIdx].scenes[sceneIdx].lines = newScene.lines;
    renderPlay();
    setStatus('Scene rewritten.', 'success');
  } catch (e) {
    console.error(e); setStatus(e.message, 'error');
  }
}

function esc(s = "") { return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

function lineCountByCharacter() {
  const counts = {};
  state.play.acts.forEach(a => a.scenes.forEach(s => s.lines.forEach(l => {
    counts[l.speaker] = (counts[l.speaker] || 0) + 1;
  })));
  return counts;
}

// Stable color per character (by index)
const CHAR_COLORS = ["var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)","var(--c6)","var(--c7)","var(--c8)"];
function colorForSpeaker(name, p) {
  if (!name) return null;
  const upper = name.toUpperCase();
  if (upper === "NARRATOR") return "var(--cN)";
  if (upper === "ALL") return "var(--accent2)";
  const idx = p.characters.findIndex(c => c.name === name);
  if (idx < 0) return null;
  return CHAR_COLORS[idx % CHAR_COLORS.length];
}
function initialOf(name) {
  const t = (name || "?").trim();
  return t ? t[0].toUpperCase() : "?";
}
function ordinal(n) {
  return ["One","Two","Three","Four","Five","Six","Seven","Eight"][n - 1] || String(n);
}
function gradeLabel(b) { return b === "K-2" ? "Grades K–2" : "Grades 3–5"; }
function lessonLabelFromKey(key) {
  return ({
    kindness:"Kindness", honesty:"Honesty", courage:"Courage", friendship:"Friendship",
    perseverance:"Perseverance", sharing:"Sharing", teamwork:"Teamwork",
    environment:"Caring for the Environment", inclusion:"Inclusion & Belonging",
    responsibility:"Responsibility", patience:"Patience", gratitude:"Gratitude",
  })[key] || key;
}

function renderLineHtmlForItem(item, p, allSpeakers) {
  const { ai, si, li, line: ln } = item;
  const upper = (ln.speaker || '').toUpperCase();
  const isNarrator = upper === 'NARRATOR';
  const isAll = upper === 'ALL';
  const color = colorForSpeaker(ln.speaker, p);
  const cls = ['line'];
  if (isNarrator) cls.push('narrator');
  if (isAll) cls.push('all');
  const styleAttr = color ? ` style="--ch: ${color};"` : '';
  const speakerOptions = allSpeakers.map(s => `<option ${s === ln.speaker ? 'selected' : ''}>${esc(s)}</option>`).join('');
  return `<div class="${cls.join(' ')}" data-speaker="${esc(ln.speaker)}"${styleAttr}>
    <div class="speaker"><select data-bind-speaker="${ai}-${si}-${li}">${speakerOptions}</select></div>
    <div>
      <div class="text editable" data-bind-text="${ai}-${si}-${li}">${esc(ln.text)}</div>
      ${ln.direction ? `<span class="direction editable" data-bind-dir="${ai}-${si}-${li}">(${esc(ln.direction)})</span>` : ''}
    </div>
  </div>`;
}

// Measure-based pagination. Each script "page" is an array of items.
function paginateScriptByMeasure(p) {
  const allSpeakers = [...p.characters.map(c => c.name), "NARRATOR", "ALL"];

  // Items in order
  const items = [];
  p.acts.forEach((act, ai) => {
    act.scenes.forEach((sc, si) => {
      items.push({ kind: 'sceneStart', ai, si, isFirstSceneOfAct: si === 0 });
      sc.lines.forEach((ln, li) => items.push({ kind: 'line', ai, si, li, line: ln }));
    });
  });

  // Determine target page dimensions: copy from current CSS using a temp page-paper
  const probe = document.createElement('article');
  probe.className = 'page-paper';
  probe.style.cssText = 'position:fixed; left:-99999px; top:0; visibility:hidden; display:flex; flex-direction:column;';
  document.body.appendChild(probe);
  const cs = getComputedStyle(probe);
  const pageW = parseFloat(cs.width) || 600;
  const pageH = parseFloat(cs.height) || 800;
  const padTop = parseFloat(cs.paddingTop) || 48;
  const padBottom = parseFloat(cs.paddingBottom) || 56;
  const padLeft = parseFloat(cs.paddingLeft) || 64;
  const padRight = parseFloat(cs.paddingRight) || 64;
  document.body.removeChild(probe);

  const innerH = pageH - padTop - padBottom;

  // Measurer that mirrors the page's content area (override aspect-ratio so it grows with content)
  const m = document.createElement('article');
  m.className = 'page-paper measurer';
  m.style.cssText = `position:fixed; left:-99999px; top:0; width:${pageW}px; min-height:0; height:auto; aspect-ratio:auto; max-height:none; padding:${padTop}px ${padRight}px ${padBottom}px ${padLeft}px; box-sizing:border-box; visibility:hidden; display:flex; flex-direction:column; overflow:visible;`;
  document.body.appendChild(m);

  const renderItems = (items) => {
    let html = `<div class="page-running">${esc(p.title)}</div><div class="page-running right">Act</div>`;
    items.forEach(item => {
      if (item.kind === 'sceneStart') {
        if (item.isFirstSceneOfAct) html += renderActHeaderHtml(p.acts[item.ai]);
        html += renderSceneHeaderHtml(p.acts[item.ai].scenes[item.si], item.ai, item.si);
      } else if (item.kind === 'line') {
        html += renderLineHtmlForItem(item, p, allSpeakers);
      }
    });
    return html;
  };

  const overflows = () => m.scrollHeight > pageH - 8; // small safety margin

  const pages = [];
  let chunk = [];
  for (const item of items) {
    chunk.push(item);
    m.innerHTML = renderItems(chunk);
    if (overflows()) {
      // Pop item, save page, restart with item
      chunk.pop();
      if (chunk.length === 0) {
        pages.push([item]);
        chunk = [];
      } else {
        pages.push(chunk);
        // Re-attach the popped item; if it's a line and we're moving to next page,
        // ensure the next page repeats the scene header so the reader has context.
        const popped = item;
        chunk = [];
        if (popped.kind === 'line') {
          // Find the most recent scene-start for this line
          const scStart = { kind: 'sceneStart', ai: popped.ai, si: popped.si, isFirstSceneOfAct: false, isContinuation: true };
          chunk.push(scStart);
        }
        chunk.push(popped);
      }
    }
  }
  if (chunk.length) pages.push(chunk);

  document.body.removeChild(m);
  return pages;
}

function buildPages(p) {
  const pages = [];
  pages.push({ kind: 'cover', label: 'Title Page' });
  pages.push({ kind: 'front', label: 'Front Matter — Cast & Notes' });

  const scriptPages = paginateScriptByMeasure(p);
  let lastActNum = null;
  scriptPages.forEach((chunk) => {
    const firstWithAct = chunk.find(x => x.ai !== undefined);
    const actNum = firstWithAct ? p.acts[firstWithAct.ai].number : 1;
    const cont = actNum === lastActNum;
    pages.push({
      kind: 'script', actNum, items: chunk,
      label: `Act ${ordinal(actNum).toUpperCase()}${cont ? ' (cont.)' : ''}`,
    });
    lastActNum = actNum;
  });

  pages.forEach((pg, i) => pg.num = i + 1);
  return pages;
}

function renderPlay() {
  const out = document.getElementById('output');
  const p = state.play;
  if (!p) { out.innerHTML = ''; return; }
  document.getElementById('docTitle').textContent = p.title;

  const counts = lineCountByCharacter();
  const charNames = p.characters.map(c => c.name);
  const allSpeakers = [...charNames, "NARRATOR", "ALL"];

  const prevReh = (window._lastRehChar || '');
  const eyebrow = `A Children's Play · ${gradeLabel(state.gradeBand)} · Lesson: ${lessonLabelFromKey(state.lesson)}`;
  const pages = buildPages(p);
  const totalPages = pages.length;

  const navHtml = `
    <div class="page-nav">
      <button id="prevPage">← Prev</button>
      <span class="counter">Page <span id="curPage">1</span> of ${totalPages}</span>
      <select id="jumpPage">
        ${pages.map(pg => `<option value="${pg.num}">Page ${pg.num} — ${esc(pg.label)}</option>`).join('')}
      </select>
      <button id="nextPage">Next →</button>
      <span class="reh-spacer"></span>
      <span class="rehearsal-bar show">
        <label for="rehearsalChar">🎭 Rehearsal</label>
        <select id="rehearsalChar">
          <option value="">All characters</option>
          ${charNames.map(n => `<option value="${esc(n)}"${n===prevReh?' selected':''}>${esc(n)}</option>`).join('')}
        </select>
      </span>
    </div>
  `;

  const renderCover = (pg) => `
    <article class="page-paper" data-page="${pg.num}" data-kind="cover">
      <div class="page-running">${esc(eyebrow)}</div>
      <header class="cover">
        <h1 class="play-title editable" contenteditable="true" data-bind="title">${esc(p.title)}</h1>
        <div class="rule"></div>
        <p class="logline editable" contenteditable="true" data-bind="logline">${esc(p.logline)}</p>
        <div class="meta-row">
          ~${p.estimatedRunTimeMin || '?'} min<span class="dot">·</span>
          ${p.acts.length} act${p.acts.length>1?'s':''}<span class="dot">·</span>
          ${p.characters.length} roles
        </div>
      </header>
      <div class="page-num">— ${pg.num} —</div>
    </article>`;

  const renderFront = (pg) => `
    <article class="page-paper" data-page="${pg.num}" data-kind="front">
      <div class="page-running">${esc(p.title)}</div>
      <div class="page-running right">Front Matter</div>

      <section class="teacher-note">
        <div class="label">Teacher's note — lesson</div>
        <div class="editable" contenteditable="true" data-bind="lessonTakeaway">${esc(p.lessonTakeaway)}</div>
      </section>

      <h2 class="section-h">Cast of Characters</h2>
      <div class="cast-grid">
        ${p.characters.map((c, i) => {
          const color = CHAR_COLORS[i % CHAR_COLORS.length];
          const lc = counts[c.name] || 0;
          return `
            <div class="cast-card" style="--ch: ${color};">
              <div class="avatar"></div>
              <div class="info">
                <span class="name editable" contenteditable="true" data-bind-char="${i}">${esc(c.name)}</span>
                <span class="desc"> — <span class="editable" contenteditable="true" data-bind-char-desc="${i}">${esc(c.description)}</span></span>
              </div>
              <div class="lines-right">${lc} line${lc===1?'':'s'}</div>
            </div>`;
        }).join('')}
      </div>

      <h2 class="section-h">Setting</h2>
      <div class="setting-block editable" contenteditable="true" data-bind="setting">${esc(p.setting)}</div>

      <h2 class="section-h">Props</h2>
      <ul class="prop-chips">
        ${p.props.map((pr, i) => `<li><span class="editable" contenteditable="true" data-bind-prop="${i}">${esc(pr)}</span></li>`).join('')}
      </ul>

      <div class="page-num">— ${pg.num} —</div>
    </article>`;

  const renderLine = (item) => {
    const { ai, si, li, line: ln } = item;
    const upper = (ln.speaker || '').toUpperCase();
    const isNarrator = upper === 'NARRATOR';
    const isAll = upper === 'ALL';
    const color = colorForSpeaker(ln.speaker, p);
    const cls = ['line'];
    if (isNarrator) cls.push('narrator');
    if (isAll) cls.push('all');
    const styleAttr = color ? ` style="--ch: ${color};"` : '';
    const speakerOptions = allSpeakers.map(s => `<option ${s === ln.speaker ? 'selected' : ''}>${esc(s)}</option>`).join('');
    return `
      <div class="${cls.join(' ')}" data-speaker="${esc(ln.speaker)}"${styleAttr}>
        <div class="speaker">
          <select data-bind-speaker="${ai}-${si}-${li}">${speakerOptions}</select>
        </div>
        <div>
          <div class="text editable" contenteditable="true" data-bind-text="${ai}-${si}-${li}">${esc(ln.text)}</div>
          ${ln.direction ? `<span class="direction editable" contenteditable="true" data-bind-dir="${ai}-${si}-${li}">(${esc(ln.direction)})</span>` : ''}
        </div>
      </div>`;
  };

  const renderScript = (pg, isFirstOfAct) => {
    const act = p.acts.find(a => a.number === pg.actNum);
    let html = `<article class="page-paper" data-page="${pg.num}" data-kind="script">
      <div class="page-running">${esc(p.title)}</div>
      <div class="page-running right">${esc(pg.label)}</div>`;
    if (isFirstOfAct) html += renderActHeaderHtml(act);
    pg.items.forEach(item => {
      if (item.kind === 'sceneStart') {
        if (item.isFirstSceneOfAct && !isFirstOfAct) html += renderActHeaderHtml(act);
        const sc = act.scenes[item.si];
        let h = renderSceneHeaderHtml(sc, item.ai, item.si);
        if (item.isContinuation) {
          h = h.replace('<span>Scene ' + sc.number + '</span>', `<span>Scene ${sc.number} <em style="opacity:.6; font-style:italic; letter-spacing:0;">— continued</em></span>`);
        }
        // make editable bits actually editable in render (measurer doesn't need contenteditable)
        h = h.replace(/data-bind-loc/g, 'contenteditable="true" data-bind-loc')
             .replace(/data-bind-od/g, 'contenteditable="true" data-bind-od');
        html += h;
      } else if (item.kind === 'line') {
        let h = renderLineHtmlForItem(item, p, allSpeakers);
        h = h.replace(/data-bind-text/g, 'contenteditable="true" data-bind-text')
             .replace(/data-bind-dir/g, 'contenteditable="true" data-bind-dir');
        html += h;
      }
    });
    if (pg.num === totalPages) html += `<div class="end-mark">— END —</div>`;
    html += `<div class="page-num">— ${pg.num} —</div></article>`;
    return html;
  };

  // Track first script page per act (to render the act header only once)
  const seenActs = new Set();
  const pagesHtml = pages.map(pg => {
    if (pg.kind === 'cover') return renderCover(pg);
    if (pg.kind === 'front') return renderFront(pg);
    if (pg.kind === 'script') {
      const first = !seenActs.has(pg.actNum);
      seenActs.add(pg.actNum);
      return renderScript(pg, first);
    }
    return '';
  }).join('');

  out.innerHTML = navHtml + `<div class="doc">${pagesHtml}</div>`;
  attachEditHandlers();
  // Post-render pass: split any page-paper that visually overflows
  rebalanceOverflowingPages();
  attachPageNav(document.querySelectorAll('.page-paper').length);
  applyRehearsal();
}

// After render, walk each page and if its content exceeds the box, push trailing
// elements to a new page-paper inserted right after.
function rebalanceOverflowingPages() {
  const doc = document.querySelector('#output .doc');
  if (!doc) return;
  let safety = 0;
  let pages = Array.from(doc.querySelectorAll('.page-paper'));
  for (let pi = 0; pi < pages.length && safety < 40; pi++, safety++) {
    const page = pages[pi];
    page.classList.add('is-active'); // make it measurable
    if (page.scrollHeight <= page.clientHeight) { page.classList.remove('is-active'); continue; }

    // Identify "movable" trailing children (lines, scene-blocks not at the start)
    const movableSelector = '.line, .scene-block, .end-mark';
    // Walk children from end, collecting until cumulative remaining height <= available
    const innerH = page.clientHeight;
    // Find the splitting child: walk forward summing heights of body children
    const childArr = Array.from(page.children);
    let runningTop = 0;
    let splitFromIdx = -1;
    for (let i = 0; i < childArr.length; i++) {
      const c = childArr[i];
      const top = c.offsetTop;
      const bottom = top + c.offsetHeight;
      if (bottom > innerH - 24) { splitFromIdx = i; break; }
    }
    if (splitFromIdx === -1) { page.classList.remove('is-active'); continue; }

    // Don't split if splitting element is essential header (page-running, act-h, etc.) — keep it on page
    const splitEl = childArr[splitFromIdx];
    const tag = splitEl.tagName.toLowerCase();
    const cls = splitEl.className || '';
    if (cls.includes('page-running') || cls.includes('page-num')) {
      page.classList.remove('is-active'); continue;
    }

    // Create new page after this one (clone outer attrs)
    const newPage = document.createElement('article');
    newPage.className = 'page-paper';
    newPage.dataset.kind = page.dataset.kind || 'script';
    // Copy running headers
    const runningEls = page.querySelectorAll('.page-running');
    runningEls.forEach(re => newPage.appendChild(re.cloneNode(true)));

    // Move splitFrom + everything after (except trailing page-num) to new page
    const toMove = [];
    for (let i = splitFromIdx; i < childArr.length; i++) {
      const c = childArr[i];
      if (c.classList.contains('page-num') || c.classList.contains('page-running')) continue;
      toMove.push(c);
    }
    toMove.forEach(c => newPage.appendChild(c));

    // Add page-num placeholder (will be renumbered)
    const num = document.createElement('div');
    num.className = 'page-num'; num.textContent = '— ? —';
    newPage.appendChild(num);

    // Insert after current
    page.parentNode.insertBefore(newPage, page.nextSibling);
    page.classList.remove('is-active');
    pages = Array.from(doc.querySelectorAll('.page-paper'));
  }
  // Renumber pages and page-num markers
  pages = Array.from(doc.querySelectorAll('.page-paper'));
  pages.forEach((p, i) => {
    p.dataset.page = i + 1;
    const num = p.querySelector('.page-num');
    if (num) num.textContent = `— ${i + 1} —`;
  });
  // Rebuild jump dropdown
  const sel = document.getElementById('jumpPage');
  if (sel) {
    const total = pages.length;
    sel.innerHTML = pages.map((p, i) => {
      const kind = p.dataset.kind;
      const label = kind === 'cover' ? 'Title Page' : kind === 'front' ? 'Front Matter' : 'Script';
      return `<option value="${i + 1}">Page ${i + 1} — ${label}</option>`;
    }).join('');
  }
  // Update counter
  const counter = document.querySelector('.page-nav .counter');
  if (counter) counter.innerHTML = `Page <span id="curPage">1</span> of ${pages.length}`;
}

let _activePage = 1;
let _totalPages = 1;
function setActivePage(n) {
  _activePage = Math.max(1, Math.min(_totalPages, n));
  document.querySelectorAll('.page-paper').forEach(el => {
    el.classList.toggle('is-active', +el.dataset.page === _activePage);
  });
  const cur = document.getElementById('curPage'); if (cur) cur.textContent = _activePage;
  const sel = document.getElementById('jumpPage'); if (sel && sel.value !== String(_activePage)) sel.value = String(_activePage);
  const prev = document.getElementById('prevPage'); if (prev) prev.disabled = _activePage <= 1;
  const next = document.getElementById('nextPage'); if (next) next.disabled = _activePage >= _totalPages;
  const fl = document.getElementById('flipLeft'); if (fl) fl.disabled = _activePage <= 1;
  const fr = document.getElementById('flipRight'); if (fr) fr.disabled = _activePage >= _totalPages;
  window.scrollTo({ top: 0, behavior: 'instant' });
}
function attachPageNav(total) {
  _totalPages = total;
  _activePage = 1;
  const sel = document.getElementById('jumpPage');
  document.getElementById('prevPage').addEventListener('click', () => setActivePage(_activePage - 1));
  document.getElementById('nextPage').addEventListener('click', () => setActivePage(_activePage + 1));
  sel.addEventListener('change', () => setActivePage(+sel.value));
  // Floating flip arrows (only shown when a play exists)
  const fl = document.getElementById('flipLeft');
  const fr = document.getElementById('flipRight');
  if (fl && fr) {
    fl.classList.add('show'); fr.classList.add('show');
    fl.onclick = () => setActivePage(_activePage - 1);
    fr.onclick = () => setActivePage(_activePage + 1);
  }
  setActivePage(1);
}
// Keyboard navigation: ← / → or PageUp / PageDown
if (!window._pageKeyBound) {
  window._pageKeyBound = true;
  document.addEventListener('keydown', e => {
    if (!state.play) return;
    // Don't hijack typing in inputs / contenteditable
    const tag = (e.target && e.target.tagName) || '';
    if (e.target && (e.target.isContentEditable || /INPUT|SELECT|TEXTAREA/.test(tag))) return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); setActivePage(_activePage + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); setActivePage(_activePage - 1); }
  });
}

// Refresh per-character "N lines" labels on the front-matter page without re-paginating
function updateCastLineCounts() {
  if (!state.play) return;
  const counts = lineCountByCharacter();
  state.play.characters.forEach((c, i) => {
    const card = document.querySelector(`.cast-card .info [data-bind-char="${i}"]`);
    if (!card) return;
    const lc = counts[c.name] || 0;
    const right = card.closest('.cast-card')?.querySelector('.lines-right');
    if (right) right.textContent = `${lc} line${lc === 1 ? '' : 's'}`;
  });
}

function applyRehearsal() {
  const sel = document.getElementById('rehearsalChar');
  const target = sel ? sel.value : '';
  window._lastRehChar = target;
  document.body.classList.toggle('rehearse-on', !!target);
  document.querySelectorAll('.line').forEach(el => {
    el.classList.toggle('spotlight', !!target && el.dataset.speaker === target);
  });
}
// Wire up rehearsal select after each render via event delegation
document.addEventListener('change', e => {
  if (e.target && e.target.id === 'rehearsalChar') applyRehearsal();
});

function attachEditHandlers() {
  const out = document.getElementById('output');

  out.querySelectorAll('[data-bind]').forEach(el => {
    el.addEventListener('blur', () => {
      const key = el.dataset.bind;
      state.play[key] = el.textContent.trim();
      if (key === 'title') document.getElementById('docTitle').textContent = state.play[key];
    });
  });

  out.querySelectorAll('[data-bind-char]').forEach(el => {
    el.addEventListener('blur', () => {
      const i = +el.dataset.bindChar;
      const oldName = state.play.characters[i].name;
      const newName = el.textContent.trim();
      if (oldName === newName || !newName) { el.textContent = oldName; return; }
      state.play.characters[i].name = newName;
      state.play.acts.forEach(a => a.scenes.forEach(s => s.lines.forEach(l => {
        if (l.speaker === oldName) l.speaker = newName;
      })));
      renderPlay();
    });
  });
  out.querySelectorAll('[data-bind-char-desc]').forEach(el => {
    el.addEventListener('blur', () => {
      const i = +el.dataset.bindCharDesc;
      state.play.characters[i].description = el.textContent.trim();
    });
  });

  out.querySelectorAll('[data-bind-prop]').forEach(el => {
    el.addEventListener('blur', () => {
      const i = +el.dataset.bindProp;
      const oldP = state.play.props[i];
      const newP = el.textContent.trim();
      if (oldP === newP || !newP) { el.textContent = oldP; return; }
      state.play.props[i] = newP;
      const re = new RegExp('\\b' + oldP.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'gi');
      state.play.acts.forEach(a => a.scenes.forEach(s => s.lines.forEach(l => {
        l.text = l.text.replace(re, newP);
        if (l.direction) l.direction = l.direction.replace(re, newP);
      })));
      renderPlay();
    });
  });

  out.querySelectorAll('[data-bind-loc]').forEach(el => {
    el.addEventListener('blur', () => {
      const [ai, si] = el.dataset.bindLoc.split('-').map(Number);
      state.play.acts[ai].scenes[si].location = el.textContent.trim();
    });
  });
  out.querySelectorAll('[data-bind-od]').forEach(el => {
    el.addEventListener('blur', () => {
      const [ai, si] = el.dataset.bindOd.split('-').map(Number);
      state.play.acts[ai].scenes[si].openingDirection = el.textContent.trim().replace(/^\(|\)$/g,'');
    });
  });

  out.querySelectorAll('[data-bind-text]').forEach(el => {
    el.addEventListener('blur', () => {
      const [ai, si, li] = el.dataset.bindText.split('-').map(Number);
      state.play.acts[ai].scenes[si].lines[li].text = el.textContent.trim();
    });
  });
  out.querySelectorAll('[data-bind-dir]').forEach(el => {
    el.addEventListener('blur', () => {
      const [ai, si, li] = el.dataset.bindDir.split('-').map(Number);
      state.play.acts[ai].scenes[si].lines[li].direction = el.textContent.trim().replace(/^\(|\)$/g,'');
    });
  });
  out.querySelectorAll('[data-bind-speaker]').forEach(el => {
    el.addEventListener('change', () => {
      const [ai, si, li] = el.dataset.bindSpeaker.split('-').map(Number);
      const newSpeaker = el.value;
      state.play.acts[ai].scenes[si].lines[li].speaker = newSpeaker;
      // In-place DOM update: avoid full re-render
      const lineEl = el.closest('.line');
      if (lineEl) {
        const upper = newSpeaker.toUpperCase();
        lineEl.dataset.speaker = newSpeaker;
        lineEl.classList.toggle('narrator', upper === 'NARRATOR');
        lineEl.classList.toggle('all', upper === 'ALL');
        const color = colorForSpeaker(newSpeaker, state.play);
        if (color) lineEl.style.setProperty('--ch', color);
        else lineEl.style.removeProperty('--ch');
      }
      // Refresh cast line counts in place
      updateCastLineCounts();
    });
  });

  out.querySelectorAll('[data-rescene]').forEach(el => {
    el.addEventListener('click', () => {
      const [ai, si] = el.dataset.rescene.split('-').map(Number);
      regenerateScene(ai, si);
    });
  });
}

function playToText(p = state.play) {
  if (!p) return '';
  const wrap = (txt, indent = 0) => {
    const ind = ' '.repeat(indent);
    const max = 76 - indent;
    const words = txt.split(/\s+/);
    const lines = []; let cur = '';
    for (const w of words) {
      if ((cur + ' ' + w).trim().length > max) { lines.push(ind + cur.trim()); cur = w; }
      else cur = (cur + ' ' + w).trim();
    }
    if (cur) lines.push(ind + cur.trim());
    return lines.join('\n');
  };
  const center = txt => {
    const pad = Math.max(0, Math.floor((76 - txt.length) / 2));
    return ' '.repeat(pad) + txt;
  };

  let t = '';
  // ===== Cover =====
  t += '\n\n' + center(p.title.toUpperCase()) + '\n';
  t += center('=' .repeat(Math.min(p.title.length, 60))) + '\n\n';
  t += wrap(p.logline) + '\n\n';
  t += center(`~${p.estimatedRunTimeMin || '?'} min  ·  ${p.acts.length} act${p.acts.length>1?'s':''}  ·  ${p.characters.length} roles`) + '\n\n';
  t += '\n' + '-'.repeat(76) + '\n';

  // ===== Teacher's note =====
  t += '\nTEACHER\'S NOTE — LESSON\n';
  t += wrap(p.lessonTakeaway, 4) + '\n\n';

  // ===== Cast =====
  t += 'CAST OF CHARACTERS\n';
  p.characters.forEach(c => {
    t += `    ${c.name.padEnd(14)}  ${c.description}\n`;
  });
  t += '\n';

  // ===== Setting =====
  t += 'SETTING\n';
  t += wrap(p.setting, 4) + '\n\n';

  // ===== Props =====
  t += 'PROPS\n';
  p.props.forEach(x => { t += `    · ${x}\n`; });
  t += '\n' + '-'.repeat(76) + '\n';

  // ===== Acts & scenes =====
  p.acts.forEach(a => {
    t += '\n\n' + center(`ACT ${ordinal(a.number).toUpperCase()}${a.title ? ' — ' + a.title.toUpperCase() : ''}`) + '\n\n';
    a.scenes.forEach(s => {
      t += `\nSCENE ${s.number}\n`;
      t += wrap(s.location.toUpperCase(), 0) + '\n';
      if (s.openingDirection) t += '\n' + wrap(`(${s.openingDirection})`, 4) + '\n';
      t += '\n';
      s.lines.forEach(l => {
        const speaker = l.speaker.toUpperCase();
        // Speaker on its own line, dialogue indented underneath (closer to standard playscript layout)
        t += '              ' + speaker + (l.direction ? ' (' + l.direction + ')' : '') + '\n';
        t += wrap(l.text, 4) + '\n\n';
      });
    });
  });

  t += '\n' + center('— END —') + '\n\n';
  return t;
}

async function copyText() {
  if (!state.play) return;
  try { await navigator.clipboard.writeText(playToText()); setStatus('Copied to clipboard.', 'success'); }
  catch { setStatus('Copy failed', 'error'); }
}
function downloadText() {
  if (!state.play) return;
  const blob = new Blob([playToText()], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.play.title || 'play').replace(/[^a-z0-9]+/gi,'_') + '.txt';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function loadLibrary() { return JSON.parse(localStorage.getItem('cplay.lib') || '[]'); }
function saveLibrary(arr) { localStorage.setItem('cplay.lib', JSON.stringify(arr)); }
function saveToLibrary() {
  if (!state.play) return;
  const lib = loadLibrary();
  lib.unshift({ id: Date.now(), savedAt: new Date().toISOString(), seed: state.seed, play: state.play });
  saveLibrary(lib.slice(0, 50));
  renderLibrary();
  setStatus('Saved to library.', 'success');
}
function renderLibrary() {
  const lib = loadLibrary();
  const root = document.getElementById('library');
  if (!lib.length) { root.innerHTML = ''; return; }
  root.innerHTML = `<h2>Saved plays</h2>` + lib.map(item => `
    <div class="lib-item" data-id="${item.id}">
      <span><strong>${esc(item.play.title)}</strong> <span style="color:var(--muted)">· ${new Date(item.savedAt).toLocaleString()}${item.seed ? ' · seed ' + esc(String(item.seed)) : ''}</span></span>
      <span>
        <button data-load="${item.id}">Open</button>
        <button data-del="${item.id}">Delete</button>
      </span>
    </div>`).join('');
  root.querySelectorAll('[data-load]').forEach(b => b.addEventListener('click', () => {
    const lib = loadLibrary();
    const found = lib.find(x => x.id == b.dataset.load);
    if (found) {
      state.play = found.play;
      renderPlay();
      document.body.classList.add('has-play');
      setView('play');
      window.scrollTo({top:0,behavior:'smooth'});
    }
  }));
  root.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
    saveLibrary(loadLibrary().filter(x => x.id != b.dataset.del));
    renderLibrary();
  }));
}

/* ============================================================
   SURPRISE / NEW
   ============================================================ */
function surpriseMe() {
  const lessons = Object.keys(LESSONS);
  const tones = ['silly','heartfelt','adventurous','mysterious','fairytale'];
  const conflicts = ['vs-self','vs-other','vs-nature','vs-group'];
  const settings = Object.keys(SETTINGS);

  state.lesson = pickAny(lessons);
  state.tone = pickAny(tones);
  state.conflict = pickAny(conflicts);
  state.setting = pickAny(settings);
  state.random = chanceAny(0.5) ? 'spicy' : 'none';
  state.characters = []; state.props = [];
  state.seed = String(Math.floor(Math.random() * 1e9));

  document.querySelectorAll('[data-chips="tone"] .chip').forEach(c => c.setAttribute('aria-pressed', c.dataset.val === state.tone ? 'true':'false'));
  document.querySelectorAll('[data-chips="conflict"] .chip').forEach(c => c.setAttribute('aria-pressed', c.dataset.val === state.conflict ? 'true':'false'));
  document.querySelectorAll('[data-chips="random"] .chip').forEach(c => c.setAttribute('aria-pressed', c.dataset.val === state.random ? 'true':'false'));
  document.getElementById('lesson').value = state.lesson;
  document.getElementById('setting').value = state.setting;
  document.getElementById('seed').value = state.seed;
  renderCharacterList(); renderPropList();
  generate();
}
// Math.random-based helpers (used outside the seeded RNG, e.g. picking new seed)
function pickAny(a) { return a[Math.floor(Math.random() * a.length)]; }
function chanceAny(p) { return Math.random() < p; }

function newPlay() {
  state.play = null;
  document.body.classList.remove('has-play');
  document.getElementById('docTitle').textContent = 'No play yet';
  document.getElementById('output').innerHTML = '';
  setView('setup');
}

/* ============================================================
   THEME
   ============================================================ */
function currentTheme() {
  const explicit = document.documentElement.dataset.theme;
  if (explicit) return explicit;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function updateThemeIcon() {
  ['themeToggleSetup', 'themeTogglePlay'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.textContent = currentTheme() === 'dark' ? '☼' : '☾';
  });
}
function toggleTheme() {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('cplay.theme', next);
  updateThemeIcon();
}
function initTheme() {
  const saved = localStorage.getItem('cplay.theme');
  if (saved === 'light' || saved === 'dark') {
    document.documentElement.dataset.theme = saved;
  }
  updateThemeIcon();
  ['themeToggleSetup', 'themeTogglePlay'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener('click', toggleTheme);
  });
}

/* ============================================================
   INIT
   ============================================================ */
initTheme();
wireChips();
wireForm();
renderCharacterList();
renderPropList();
renderLibrary();
</script>
